<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Style Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#111827;
}

canvas{
    display:block;
    background:#1f2937;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:24px;
    z-index:10;
}

#gameover{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    display:none;
}

#gameover h1{
    font-size:70px;
}

#gameover button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
    ❤️ Health : <span id="health">100</span><br>
    🔫 Kills : <span id="kills">0</span>
</div>

<div id="gameover">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let health = 100;
let kills = 0;
let gameEnded = false;

const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 25,
    speed: 5,
    color:"#38bdf8"
};

const bullets = [];
const enemies = [];
const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click",shoot);

function shoot(){
    bullets.push({
        x: player.x,
        y: player.y,
        size:8,
        speed:10,
        dx: mouse.x - player.x,
        dy: mouse.y - player.y
    });
}

const mouse = {x:0,y:0};

canvas.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function spawnEnemy(){

    let side = Math.floor(Math.random()*4);

    let x,y;

    if(side===0){
        x=0;
        y=Math.random()*canvas.height;
    }
    else if(side===1){
        x=canvas.width;
        y=Math.random()*canvas.height;
    }
    else if(side===2){
        x=Math.random()*canvas.width;
        y=0;
    }
    else{
        x=Math.random()*canvas.width;
        y=canvas.height;
    }

    enemies.push({
        x,
        y,
        size:30,
        speed:1.5 + Math.random()*1.5,
        color:"#ef4444"
    });
}

setInterval(()=>{
    if(!gameEnded){
        spawnEnemy();
    }
},1200);

function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    if(player.x < player.size) player.x = player.size;
    if(player.x > canvas.width-player.size) player.x = canvas.width-player.size;

    if(player.y < player.size) player.y = player.size;
    if(player.y > canvas.height-player.size) player.y = canvas.height-player.size;

    bullets.forEach((bullet,bIndex)=>{

        let angle = Math.atan2(bullet.dy, bullet.dx);

        bullet.x += Math.cos(angle)*bullet.speed;
        bullet.y += Math.sin(angle)*bullet.speed;

        if(
            bullet.x < 0 ||
            bullet.x > canvas.width ||
            bullet.y < 0 ||
            bullet.y > canvas.height
        ){
            bullets.splice(bIndex,1);
        }
    });

    enemies.forEach((enemy,eIndex)=>{

        let angle = Math.atan2(
            player.y - enemy.y,
            player.x - enemy.x
        );

        enemy.x += Math.cos(angle)*enemy.speed;
        enemy.y += Math.sin(angle)*enemy.speed;

        bullets.forEach((bullet,bIndex)=>{

            let dx = bullet.x - enemy.x;
            let dy = bullet.y - enemy.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < enemy.size){

                enemies.splice(eIndex,1);
                bullets.splice(bIndex,1);

                kills++;

                document.getElementById("kills").innerText = kills;
            }

        });

        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;

        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < player.size + enemy.size){

            health -= 1;

            document.getElementById("health").innerText = health;

            if(health <= 0){
                gameOver();
            }
        }

    });

}

function drawPlayer(){

    ctx.save();

    ctx.translate(player.x,player.y);

    let angle = Math.atan2(
        mouse.y-player.y,
        mouse.x-player.x
    );

    ctx.rotate(angle);

    ctx.fillStyle = player.color;

    ctx.fillRect(-20,-20,40,40);

    ctx.fillStyle="white";
    ctx.fillRect(0,-5,25,10);

    ctx.restore();
}

function drawBullets(){

    bullets.forEach(bullet=>{

        ctx.beginPath();
        ctx.fillStyle="#facc15";
        ctx.arc(bullet.x,bullet.y,bullet.size,0,Math.PI*2);
        ctx.fill();

    });

}

function drawEnemies(){

    enemies.forEach(enemy=>{

        ctx.fillStyle=enemy.color;

        ctx.beginPath();
        ctx.arc(enemy.x,enemy.y,enemy.size,0,Math.PI*2);
        ctx.fill();

    });

}

function drawMap(){

    for(let i=0;i<canvas.width;i+=80){

        ctx.strokeStyle="#374151";

        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }

    for(let j=0;j<canvas.height;j+=80){

        ctx.beginPath();
        ctx.moveTo(0,j);
        ctx.lineTo(canvas.width,j);
        ctx.stroke();
    }

}

function gameOver(){

    gameEnded = true;

    document.getElementById("gameover").style.display = "block";
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawMap();

    drawPlayer();

    drawBullets();

    drawEnemies();

    if(!gameEnded){

        update();

        requestAnimationFrame(animate);

    }

}

animate();

</script>

</body>
</html>
